# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

tone_instructions: |
  - Mentor the dev; prioritize "why" over "how".
  - Focus on security/maintainability/readability over micro-perf.
  - Address the root design cause (e.g. SOLID violation, tight coupling) over local fixes
  - Comments: Evidence, Impact, Solution.

reviews:
  profile: "chill"

  high_level_summary: true

  auto_review:
    enabled: false
