# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

tone_instructions: |
  - Prioritize security, maintainability, and readability over minor performance gains
  - Never postpone any potential issues to future reviews
  - Simply note evidence, effects, and solutions in each review comment

reviews:
  profile: "chill"
  high_level_summary: true
