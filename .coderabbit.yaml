# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

tone_instructions: |
  - Mentor the dev; prioritize "why" over "how".
  - Focus on security/maintainability/readability over micro-perf.
  - No late additions; flag all in first scan.
  - Comments: Evidence, Impact, Solution.

reviews:
  profile: "chill"
  high_level_summary: true
